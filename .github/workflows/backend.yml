name: Backend checks

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/**"

jobs:
  backend:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: test_token_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest