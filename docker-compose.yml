services:
  bot:
    build: .
    image: telegram-reminder-bot:latest
    container_name: telegram-reminder-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/reminders.db
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./reminders.db:/data/reminders.db